<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORGED IN CARBON | Salisbury Greens</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: url('1.webp') no-repeat center center fixed;
            background-size: cover;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 50px;
        }

        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 4rem;
            margin: 0;
            /* Pronounced 3D effect: darker, sharper offset shadow + glow */
            text-shadow: 4px 4px 2px #000000, 0 0 20px #90EE90; 
        }

        .forged-salisbury { color: white; }
        .carbon { color: #006400; }

        h2 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.2rem;
            margin: 5px 0 0 0;
            color: white;
            text-shadow: 3px 3px 2px #000000, 0 0 15px #90EE90;
        }

        .container {
            display: grid;
            grid-template-columns: 200px 1fr 200px; /* Fixed side columns for buttons */
            width: 95%;
            max-width: 1200px;
            gap: 20px;
            padding-bottom: 50px;
        }

        .side-col {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background-color: #006400;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            text-align: center;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: transform 0.2s, background 0.3s;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn:hover {
            background-color: #003300;
            transform: scale(1.05);
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                width: 90%;
            }
            h1 { font-size: 2.5rem; }
            h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1><span class="forged-salisbury">FORGED IN</span> <span class="carbon">CARBON</span></h1>
        <h2 class="forged-salisbury">SALISBURY GREENS</h2>
    </header>

    <div class="container">
        <div class="side-col">
            <script>
                for(let i=1; i<=9; i++) {
                    document.write(`<a href="hole${i}.html" class="btn">HOLE ${i}</a>`);
                }
            </script>
        </div>

        <div></div>

        <div class="side-col">
            <script>
                for(let i=10; i<=18; i++) {
                    document.write(`<a href="hole${i}.html" class="btn">HOLE ${i}</a>`);
                }
            </script>
        </div>
    </div>

</body>
</html>
