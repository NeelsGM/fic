<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORGED IN CARBON | Salisbury Greens</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: url('1.webp') no-repeat center center fixed;
            background-size: cover;
            font-family: sans-serif;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 3.5rem;
            margin: 0;
            /* Darker, softer shadow for white backgrounds */
            text-shadow: 2px 2px 4px rgba(0, 100, 0, 0.3);
        }

        .forged { color: #222; }
        .carbon { color: #006400; }

        h2 {
            font-size: 1.2rem;
            margin: 5px 0 0 0;
            color: #444;
            text-shadow: 1px 1px 2px rgba(144, 238, 144, 0.4);
            letter-spacing: 1px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 40px;
            width: 90%;
            max-width: 600px; /* Narrower overall width */
            padding-bottom: 50px;
        }

        .btn {
            background-color: rgba(255, 255, 255, 0.7);
            color: #006400;
            padding: 12px;
            text-decoration: none;
            text-align: center;
            border: 2px solid #006400;
            border-radius: 20px; /* Rounded corners */
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .btn:hover {
            background-color: #006400;
            color: white;
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            h1 { font-size: 2.5rem; }
            .container {
                grid-template-columns: 1fr; /* Stack buttons on very small screens */
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1><span class="forged">FORGED IN</span> <span class="carbon">CARBON</span></h1>
        <h2>SALISBURY GREENS</h2>
    </header>

    <div class="container">
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <script>
                for(let i=1; i<=9; i++) {
                    document.write(`<a href="hole${i}.html" class="btn">HOLE ${i}</a>`);
                }
            </script>
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <script>
                for(let i=10; i<=18; i++) {
                    document.write(`<a href="hole${i}.html" class="btn">HOLE ${i}</a>`);
                }
            </script>
        </div>
    </div>

</body>
</html>
