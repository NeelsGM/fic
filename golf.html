<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORGED IN CARBON | Salisbury Greens</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: url('1.webp') no-repeat center center fixed;
            background-size: cover;
            font-family: sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 3rem;
            margin: 0;
            text-shadow: 0 0 15px #90EE90; /* Light green glow */
        }

        .forged { color: white; }
        .carbon { color: #006400; } /* Dark Green */

        h2 {
            font-size: 1.5rem;
            margin: 5px 0 0 0;
            text-shadow: 0 0 10px #90EE90;
            font-weight: normal;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 50px;
            width: 80%;
            max-width: 800px;
        }

        .btn {
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px;
            text-decoration: none;
            text-align: center;
            border: 1px solid #90EE90;
            border-radius: 5px;
            transition: background 0.3s;
            font-weight: bold;
        }

        .btn:hover {
            background-color: rgba(144, 238, 144, 0.3);
        }
    </style>
</head>
<body>

    <header>
        <h1><span class="forged">FORGED IN</span> <span class="carbon">CARBON</span></h1>
        <h2>SALISBURY GREENS</h2>
    </header>

    <div class="container">
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <script>
                for(let i=1; i<=9; i++) {
                    document.write(`<a href="hole${i}.html" class="btn">HOLE ${i}</a>`);
                }
            </script>
        </div>

        <div style="display: flex; flex-direction: column; gap: 15px;">
            <script>
                for(let i=10; i<=18; i++) {
                    document.write(`<a href="hole${i}.html" class="btn">HOLE ${i}</a>`);
                }
            </script>
        </div>
    </div>

</body>
</html>
