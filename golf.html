<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORGED IN CARBON | Salisbury Greens</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: url('1.webp') no-repeat center center fixed;
            background-size: cover;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 3.5rem;
            margin: 0;
            /* 3D Effect for white text: Layered shadows */
            text-shadow: 2px 2px 0px #003300, 0 0 15px #90EE90; 
        }

        .forged-salisbury { color: white; }
        .carbon { color: #006400; }

        h2 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            margin: 5px 0 0 0;
            color: white;
            text-shadow: 2px 2px 0px #003300, 0 0 10px #90EE90;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 100px; /* Large gap clears the middle */
            width: 85%;
            max-width: 900px;
            padding-bottom: 50px;
        }

        .btn {
            background-color: #006400; /* Dark green button */
            color: white;
            padding: 12px 20px;
            text-decoration: none;
            text-align: center;
            border-radius: 25px; /* Rounded corners */
            font-weight: bold;
            font-size: 1rem;
            transition: transform 0.2s, background 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn:hover {
            background-color: #004d00;
            transform: scale(1.05);
        }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            .container {
                grid-template-columns: 1fr;
                gap: 10px;
                width: 90%;
            }
            h1 { font-size: 2rem; }
            h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1><span class="forged-salisbury">FORGED IN</span> <span class="carbon">CARBON</span></h1>
        <h2 class="forged-salisbury">SALISBURY GREENS</h2>
    </header>

    <div class="container">
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <script>
                for(let i=1; i<=9; i++) {
                    document.write(`<a href="hole${i}.html" class="btn">HOLE ${i}</a>`);
                }
            </script>
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <script>
                for(let i=10; i<=18; i++) {
                    document.write(`<a href="hole${i}.html" class="btn">HOLE ${i}</a>`);
                }
            </script>
        </div>
    </div>

</body>
</html>
