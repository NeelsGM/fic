<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFRISKI | Forged in Carbon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { cyan: { 400: '#00f3ff' }, carbon: { 900: '#0a0a0a' } },
                    fontFamily: { sans: ['Rajdhani', 'sans-serif'], display: ['Orbitron', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0a; color: #d1d5db; font-family: 'Rajdhani', sans-serif; }
        canvas#bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <main class="flex flex-col items-center px-4 pt-16">
        <div class="mb-8 text-center">
            <h1 class="font-display text-white text-2xl md:text-3xl font-bold uppercase tracking-[0.2em] whitespace-nowrap">
                FIC / AFRISKI
            </h1>
        </div>

        <div class="w-full max-w-4xl aspect-video bg-black/50 border border-white/10 backdrop-blur-md shadow-2xl shadow-cyan-400/10 overflow-hidden mb-8">
            <iframe 
                id="viewer" 
                class="w-full h-full"
                allow="fullscreen; xr-spatial-tracking" 
                src="https://superspl.at/s?id=d427eb61">
            </iframe>
        </div>

        <div class="text-center">
            <h2 class="font-display text-white text-2xl md:text-3xl font-bold uppercase tracking-[0.2em]">
                KOO LEMEKE
            </h2>
        </div>
    </main>

<script>
    // Particle Background Logic
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    const geometry = new THREE.BufferGeometry();
    const vertices = [];
    for (let i = 0; i < 1500; i++) {
        vertices.push(THREE.MathUtils.randFloatSpread(50), THREE.MathUtils.randFloatSpread(50), THREE.MathUtils.randFloatSpread(50));
    }
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    const particles = new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0x00f3ff, size: 0.04 }));
    scene.add(particles);

    camera.position.z = 15;

    function animate() {
        requestAnimationFrame(animate);
        particles.rotation.y += 0.0003; 
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
