<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FIC-3D // Dynamic AR Navigation Matrix</title>
    <style>
        :root {
            --bg-dark: rgba(10, 15, 20, 0.9);
            --accent-cyan: #00f0ff;
            --text-main: #e0e6ed;
            --border-glow: 1px solid rgba(0, 240, 255, 0.3);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: sans-serif;
            background-color: #000; color: var(--text-main);
        }

        #viewport-container { width: 100%; height: 100%; position: absolute; z-index: 1; }

        /* Admin Dashboard Overlay */
        #admin-panel {
            position: absolute; top: 10px; left: 10px;
            background: var(--bg-dark); border: var(--border-glow);
            padding: 12px; border-radius: 8px; z-index: 100;
            max-width: 280px; font-size: 0.8rem;
            backdrop-filter: blur(10px);
        }
        .admin-toggle {
            background: #101720; color: var(--accent-cyan);
            border: 1px solid var(--accent-cyan); padding: 4px 8px;
            cursor: pointer; border-radius: 4px; margin-bottom: 8px;
        }
        .admin-hide { display: none; }
        .file-input-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 4px; color: #7a8c9e; }
        
        /* Navigation HUD */
        #hud-overlay {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: var(--bg-dark);
            border: var(--border-glow); border-radius: 8px; padding: 15px;
            z-index: 10; box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
        }
        .hud-header { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-cyan); margin-bottom: 8px; }
        select { width: 100%; padding: 10px; background: #101720; border: 1px solid #1e293b; color: var(--text-main); border-radius: 4px; }

        /* Arrival UI */
        #arrival-card {
            position: absolute; bottom: -300px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 380px; background: #101720;
            border-top: 3px solid var(--accent-cyan); border-radius: 12px 12px 0 0;
            padding: 20px; z-index: 20; transition: bottom 0.4s ease;
        }
        #arrival-card.active { bottom: 0; }
        .close-btn { background: transparent; border: 1px solid var(--accent-cyan); color: var(--accent-cyan); width: 100%; padding: 8px; cursor: pointer; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "gaussian-splats-3d": "https://unpkg.com/@mkkellogg/gaussian-splats-3d@0.4.4/build/gaussian-splats-3d.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="viewport-container"></div>

    <div id="admin-panel">
        <button class="admin-toggle" onclick="toggleAdmin()">⚙️ Toggle Data Control</button>
        <div id="admin-contents" class="admin-hide">
            <div class="file-input-group">
                <label>1. Upload Gaussian Splat (.ply)</label>
                <input type="file" id="splat-file-input" accept=".ply">
            </div>
            <div class="file-input-group">
                <label>2. Upload PlayCanvas Coordinates (.json)</label>
                <input type="file" id="json-file-input" accept=".json">
            </div>
            <button class="admin-toggle" style="width:100%" onclick="clearSavedData()">Clear Cached Assets</button>
        </div>
    </div>

    <div id="hud-overlay">
        <div class="hud-header" id="route-status">Awaiting Map & Matrix Configuration</div>
        <select id="destination-selector">
            <option value="">-- Choose Target --</option>
        </select>
    </div>

    <div id="arrival-card">
        <div id="pop-title" style="font-weight:bold; font-size:1.2rem; margin-bottom:5px;"></div>
        <div id="pop-msg" style="font-size:0.85rem; color:#7a8c9e; margin-bottom:15px;"></div>
        <button class="close-btn" onclick="dismissArrival()">Acknowledge</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import * as GaussianSplats3D from 'gaussian-splats-3d';

        let viewer, scene, camera, activeTargetKey = null, navPathLine = null;
        let spatialConfigData = null;

        const container = document.getElementById('viewport-container');
        const dbName = "SplatStorageEngine", storeName = "splatCache";

        // Initialize Core Viewport UI
        viewer = new GaussianSplats3D.Viewer({
            'selfDrivenMode': true, 'useBuiltInControls': true, 'rootElement': container,
            'initialCameraPosition': [0, 5, 10], 'initialCameraLookAt': [0, 0, 0], 'sphericalHarmonicsDegree': 0 
        });
        scene = viewer.threeScene; camera = viewer.camera;

        window.onload = function() {
            loadSavedJson();
            checkAndLoadCachedSplat();
            setupFileInputListeners();
        };

        // --- SECTION 1: SYSTEM FILE UPLOAD / PARSING LOGIC ---
        function setupFileInputListeners() {
            // Read and parse coordinates file
            document.getElementById('json-file-input').addEventListener('change', function(e) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    localStorage.setItem('navigation_matrix_coords', event.target.result);
                    loadSavedJson();
                };
                reader.readAsText(e.target.files[0]);
            });

            // Read and save raw 3D Splat file into browser DB
            document.getElementById('splat-file-input').addEventListener('change', function(e) {
                const file = e.target.files[0];
                const openDB = indexedDB.open(dbName, 1);
                
                openDB.onupgradeneeded = function() { openDB.result.createObjectStore(storeName); };
                openDB.onsuccess = function() {
                    const db = openDB.result;
                    const tx = db.transaction(storeName, "readwrite");
                    tx.objectStore(storeName).put(file, "active_scan");
                    tx.oncomplete = function() { window.location.reload(); };
                };
            });
        }

        // --- SECTION 2: STORAGE RETRIEVAL ENGINES ---
        function loadSavedJson() {
            const rawJson = localStorage.getItem('navigation_matrix_coords');
            if (!rawJson) return;
            
            spatialConfigData = JSON.parse(rawJson);
            const selector = document.getElementById('destination-selector');
            selector.innerHTML = '<option value="">-- Choose Target --</option>';

            for (let key in spatialConfigData.shops) {
                let opt = document.createElement('option');
                opt.value = key;
                opt.innerText = spatialConfigData.shops[key].name || key;
                selector.appendChild(opt);
            }
            document.getElementById('route-status').innerText = "Matrix Coordinates Loaded";
            initUrlRouting();
        }

        function checkAndLoadCachedSplat() {
            const openDB = indexedDB.open(dbName, 1);
            openDB.onupgradeneeded = function() { openDB.result.createObjectStore(storeName); };
            openDB.onsuccess = function() {
                const db = openDB.result;
                const tx = db.transaction(storeName, "readonly");
                const request = tx.objectStore(storeName).get("active_scan");
                
                request.onsuccess = function() {
                    if (request.result) {
                        const blobUrl = URL.createObjectURL(request.result);
                        viewer.addSplatScene(blobUrl, { 'splatAlphaRemovalThreshold': 5, 'showLoadingUI': true })
                        .then(() => { animateLoop(); });
                    }
                };
            };
        }

        // --- SECTION 3: CORE PATH LOGIC & ROUTING ENGINE ---
        function initUrlRouting() {
            if (!spatialConfigData) return;
            const urlParams = new URLSearchParams(window.location.search);
            const entranceParam = urlParams.get('entrance');
            
            if (entranceParam && spatialConfigData.entrances[entranceParam]) {
                const ent = spatialConfigData.entrances[entranceParam];
                camera.position.set(ent.x, ent.y + 1.6, ent.z);
                viewer.controls.target.set(ent.x, ent.y, ent.z - 5);
                viewer.controls.update();
            }

            document.getElementById('destination-selector').addEventListener('change', (e) => {
                activeTargetKey = e.target.value;
                drawNavigationPath();
            });
        }

        function drawNavigationPath() {
            if (navPathLine) { scene.remove(navPathLine); navPathLine.geometry.dispose(); navPathLine = null; }
            if (!activeTargetKey || !spatialConfigData) return;
            
            const dest = spatialConfigData.shops[activeTargetKey];
            const points = [
                new THREE.Vector3(camera.position.x, 0.05, camera.position.z),
                new THREE.Vector3(dest.x, 0.05, dest.z)
            ];

            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: 0x00f0ff, linewidth: 4, transparent: true, opacity: 0.8 });
            
            navPathLine = new THREE.Line(lineGeo, lineMat);
            scene.add(navPathLine);
        }

        function animateLoop() {
            requestAnimationFrame(animateLoop);
            if (activeTargetKey && spatialConfigData) {
                const dest = spatialConfigData.shops[activeTargetKey];
                const dx = camera.position.x - dest.x, dz = camera.position.z - dest.z;
                const distance = Math.sqrt(dx * dx + dz * dz);

                drawNavigationPath();

                if (distance < 1.8) {
                    document.getElementById('pop-title').innerText = dest.name || activeTargetKey;
                    document.getElementById('pop-msg').innerText = dest.welcome_message || "You have reached your destination.";
                    document.getElementById('arrival-card').classList.add('active');
                    activeTargetKey = null;
                    document.getElementById('destination-selector').value = "";
                    if (navPathLine) scene.remove(navPathLine);
                }
            }
        }

        // --- SECTION 4: GLOBAL INTERFACE CONTROLS ---
        window.toggleAdmin = function() {
            document.getElementById('admin-contents').classList.toggle('admin-hide');
        };
        window.dismissArrival = function() { document.getElementById('arrival-card').classList.remove('active'); };
        window.clearSavedData = function() {
            localStorage.clear();
            const openDB = indexedDB.open(dbName, 1);
            openDB.onsuccess = function() {
                const tx = openDB.result.transaction(storeName, "readwrite");
                tx.objectStore(storeName).clear();
                tx.oncomplete = function() { window.location.reload(); };
            };
        };
    </script>
</body>
</html>
